<!DOCTYPE html>
<!-- ==============================================================
     FS Workbench — application shell
     File:     index.html
     Rev:      0.12.0
     Updated:  2026-07-09
     --------------------------------------------------------------
     FROZEN FILE. Do not add page/tab scripts here — they are
     lazy-loaded by the router. Only core scripts belong below.
     ============================================================== -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Functional Safety Report Generator</title>
  <link rel="icon" type="image/x-icon" href="assets/app-icon.ico">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- ===== fixed header: app identity + project identity + actions ===== -->
  <header id="header">
    <div class="logo" id="app-brand"></div>
    <div class="proj">
      <div id="proj-name">No project open</div>
      <div id="proj-meta">Create or open a project to begin</div>
    </div>
    <div class="spacer"></div>
    <button id="btn-open" class="hbtn">Open</button>
    <button id="btn-new" class="hbtn primary">New project</button>
  </header>

  <!-- ===== fixed left menu (built by app.js from SH.MENU) =====
       Version stamp is appended at the foot of this nav by app.js. -->
  <nav id="sidebar"></nav>

  <!-- ===== main body (page + sub-tabs mount here) ===== -->
  <main id="content"></main>

  <!-- ===== core scripts only. Feature code is lazy-loaded. =====
       Load order matters:
       core -> loader -> store -> settings -> theme -> content -> doc-tabs -> risk-graph -> areas -> router -> app -->
  <script src="js/core.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/store.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/content.js"></script>
  <script src="js/doc-tabs.js"></script>
  <script src="js/risk-graph.js"></script>
  <script src="js/areas.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
